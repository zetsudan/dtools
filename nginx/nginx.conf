events {}

http {
  server {
    listen 1640;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
      return 302 /pw-planner/;
    }

    location /zr-plus-spectrum-calculator/ {
      proxy_pass http://zr_plus_spectrum_calculator:3000/;
    }

    location /optical-circuit-merger/ {
      proxy_pass http://optical_circuit_merger:3000/;
    }

    location /oel-merger/ {
      proxy_pass http://oel_merger:3000/;
    }

    location /pw-planner/ {
      proxy_pass http://pw_planner:3000/;
    }
  }
}
