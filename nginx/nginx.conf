events {}

http {
  server {
    listen 1640;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
      return 302 /home;
    }

    location = /home {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location = /favicon.svg {
      root /usr/share/nginx/html;
      try_files /favicon.svg =404;
    }

    location /zr-plus-spectrum-calculator/ {
      rewrite ^/zr-plus-spectrum-calculator/(.*)$ /$1 break;
      proxy_set_header X-Forwarded-Prefix /zr-plus-spectrum-calculator;
      proxy_pass http://zr_plus_spectrum_calculator:400;
    }

    location /optical-circuit-merger/ {
      rewrite ^/optical-circuit-merger/(.*)$ /$1 break;
      proxy_set_header X-Forwarded-Prefix /optical-circuit-merger;
      proxy_pass http://optical_circuit_merger:8000;
    }

    location /oel-merger/ {
      rewrite ^/oel-merger/(.*)$ /$1 break;
      proxy_set_header X-Forwarded-Prefix /oel-merger;
      proxy_pass http://oel_merger:9002;
    }

    location /pw-planner/ {
      rewrite ^/pw-planner/(.*)$ /$1 break;
      proxy_set_header X-Forwarded-Prefix /pw-planner;
      proxy_pass http://pw_planner:8000;

      sub_filter_types text/html;
      sub_filter_once off;
      sub_filter 'href="/' 'href="/pw-planner/';
      sub_filter 'src="/' 'src="/pw-planner/';
      sub_filter 'action="/' 'action="/pw-planner/';
    }
  }
}
