events {}

http {
  server {
    listen 1640;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    # Порты upstream выставлены под фактические listen-порты приложений.
    location /zr-plus-spectrum-calculator/ {
      proxy_pass http://zr_plus_spectrum_calculator:3000/;
    }

    location /optical-circuit-merger/ {
      proxy_pass http://optical_circuit_merger:8000/;
    }

    location /oel-merger/ {
      proxy_pass http://oel_merger:9002/;
    }

    location /pw-planner/ {
      proxy_pass http://pw_planner:8000/;
    }
  }
}
