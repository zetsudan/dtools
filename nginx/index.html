<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenWave Tools</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: Inter, system-ui, Arial, sans-serif; margin: 0; padding: 24px; background: #0b1020; color: #e5e7eb; }
    .wrap { max-width: 920px; margin: 0 auto; }
    h1 { margin-top: 0; font-size: 28px; }
    p { color: #cbd5e1; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 20px; }
    a.card { display: block; padding: 16px; border-radius: 12px; text-decoration: none; background: #111827; border: 1px solid #334155; color: #f8fafc; }
    a.card:hover { border-color: #60a5fa; transform: translateY(-1px); }
    .name { font-weight: 700; margin-bottom: 6px; }
    .path { font-size: 13px; color: #93c5fd; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OpenWave — инструменты</h1>
    <p>Единая стартовая страница. Выберите нужный инструмент:</p>

    <div class="grid">
      <a class="card" href="/zr-plus-spectrum-calculator/">
        <div class="name">ZR+ Spectrum Calculator</div>
        <div class="path">/zr-plus-spectrum-calculator/</div>
      </a>
      <a class="card" href="/optical-circuit-merger/">
        <div class="name">Optical Circuit Merger</div>
        <div class="path">/optical-circuit-merger/</div>
      </a>
      <a class="card" href="/oel-merger/">
        <div class="name">OEL Merger</div>
        <div class="path">/oel-merger/</div>
      </a>
      <a class="card" href="/pw-planner/">
        <div class="name">PW Planner</div>
        <div class="path">/pw-planner/</div>
      </a>
    </div>
  </div>
</body>
</html>
