services:
  gateway:
    image: nginx:1.27-alpine
    container_name: dtools-gateway
    ports:
      - "1640:1640"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - zr_plus_spectrum_calculator
      - optical_circuit_merger
      - oel_merger
      - pw_planner
    restart: unless-stopped

  zr_plus_spectrum_calculator:
    build:
      context: ./apps/zr_plus-spectrum-calculator
    container_name: zr-plus-spectrum-calculator
    expose:
      - "3000"
    restart: unless-stopped

  optical_circuit_merger:
    build:
      context: ./apps/optical-circuit-merger
    container_name: optical-circuit-merger
    expose:
      - "3000"
    restart: unless-stopped

  oel_merger:
    build:
      context: ./apps/oel_merger
    container_name: oel-merger
    expose:
      - "3000"
    restart: unless-stopped

  pw_planner:
    build:
      context: ./apps/pw_planner
    container_name: pw-planner
    expose:
      - "3000"
    restart: unless-stopped
